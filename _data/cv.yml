          - Designed and validated a sensor integration module.

      - company: Korea University, Human-Machine Systems Lab
        position: Master's Researcher, Drone Control Assist Interface System in Non-GPS Environments
        location: Seoul, Republic of Korea
        start_date: 2022-09
        end_date: 2024-12
        highlights:
          - Developed a drone control assistance HMI system to prevent crashes from human error during indoor drone flight.
          - Used ROS on Jetson Nano to send flight commands to a Pixhawk flight controller.
          - Integrated MAVLink and MAVROS for communication between companion computer and flight controller.
          - Tested flight assist algorithms using ROS and Gazebo simulation.

      - company: Drexel University, Intelligent Machine Perception and Learning Lab
        position: Intern Robotics Researcher, Monocular Depth Estimation
        location: Philadelphia, PA, USA
        start_date: 2023-11
        end_date: 2024-02
        highlights:
          - Used CycleGAN to convert simulation data into images resembling real-world environments for monocular depth estimation training.
          - Proposed an evaluation method comparing predicted depth with ground-truth LiDAR point clouds.
          - Improved supervised monocular depth estimation by mixing real and converted synthetic datasets.

      - company: Drexel University, Intelligent Machine Perception and Learning Lab
        position: Robotics Researcher, Autonomous Lighter-than-Air Vehicle
