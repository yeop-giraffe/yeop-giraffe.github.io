        start_date: 2023-09
        end_date: 2023-11
        highlights:
          - Developed a drone attitude control system using STM32 embedded systems and PID control.
          - Detected destinations and targets using OpenCV and YOLOv5.
          - Created a suction device for capturing objects in the air.

      - company: Korea University, Human-Machine Systems Lab
        position: Undergraduate Research Student, Tethered Drone System
        location: Seoul, Republic of Korea
        start_date: 2021-03
        end_date: 2022-08
        highlights:
